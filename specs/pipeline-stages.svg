<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa" />
  
  <!-- Definitions for arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <!-- Chunk 1: Frontend & Input -->
  <rect x="20" y="40" width="180" height="520" rx="10" fill="#e7f3ff" stroke="#007bff" stroke-width="2" />
  <text x="110" y="30" text-anchor="middle" font-weight="bold" fill="#007bff">FRONTEND / INPUT</text>
  
  <g transform="translate(35, 60)">
    <rect width="150" height="40" rx="5" fill="#fff" stroke="#007bff" />
    <text x="75" y="25" text-anchor="middle" font-size="12">TopOfPipe</text>
    
    <rect y="60" width="150" height="40" rx="5" fill="#fff" stroke="#007bff" />
    <text x="75" y="85" text-anchor="middle" font-size="12">DrawIndirect</text>
    
    <rect y="120" width="150" height="40" rx="5" fill="#fff" stroke="#007bff" />
    <text x="75" y="145" text-anchor="middle" font-size="12">VertexInput (IA)</text>
  </g>

  <!-- Chunk 2: Geometry Processing -->
  <rect x="210" y="40" width="180" height="520" rx="10" fill="#fff3e0" stroke="#fb8c00" stroke-width="2" />
  <text x="300" y="30" text-anchor="middle" font-weight="bold" fill="#fb8c00">GEOMETRY</text>
  
  <g transform="translate(225, 60)">
    <!-- Traditional Path -->
    <rect width="150" height="40" rx="5" fill="#fff" stroke="#fb8c00" />
    <text x="75" y="25" text-anchor="middle" font-size="12">VertexShader</text>
    
    <rect y="50" width="150" height="30" rx="5" fill="#fff" stroke="#fb8c00" stroke-dasharray="4" />
    <text x="75" y="70" text-anchor="middle" font-size="10" fill="#666">Tessellation (Optional)</text>
    
    <rect y="90" width="150" height="40" rx="5" fill="#fff" stroke="#fb8c00" />
    <text x="75" y="115" text-anchor="middle" font-size="12">GeometryShader</text>
    
    <line x1="75" y1="135" x2="75" y2="165" stroke="#ccc" stroke-dasharray="4" />
    
    <!-- Mesh Path -->
    <rect y="170" width="150" height="40" rx="5" fill="#fff9c4" stroke="#fbc02d" />
    <text x="75" y="195" text-anchor="middle" font-size="12" font-weight="bold">TaskShader</text>
    
    <rect y="220" width="150" height="40" rx="5" fill="#fff9c4" stroke="#fbc02d" />
    <text x="75" y="245" text-anchor="middle" font-size="12" font-weight="bold">MeshShader</text>
  </g>

  <!-- Chunk 3: Rasterization & Pixel -->
  <rect x="400" y="40" width="180" height="520" rx="10" fill="#f1f8e9" stroke="#43a047" stroke-width="2" />
  <text x="490" y="30" text-anchor="middle" font-weight="bold" fill="#43a047">RASTER / PIXEL</text>
  
  <g transform="translate(415, 60)">
    <rect width="150" height="40" rx="5" fill="#c8e6c9" stroke="#43a047" />
    <text x="75" y="25" text-anchor="middle" font-size="12">EarlyFragmentTests</text>
    
    <rect y="60" width="150" height="60" rx="5" fill="#fff" stroke="#43a047" stroke-width="2" />
    <text x="75" y="95" text-anchor="middle" font-size="14" font-weight="bold">FragmentShader</text>
    
    <rect y="140" width="150" height="40" rx="5" fill="#c8e6c9" stroke="#43a047" />
    <text x="75" y="165" text-anchor="middle" font-size="12">LateFragmentTests</text>
    
    <rect y="200" width="150" height="40" rx="5" fill="#fff" stroke="#43a047" />
    <text x="75" y="225" text-anchor="middle" font-size="12">ColorAttachmentOutput</text>
  </g>

  <!-- Chunk 4: Compute & RT -->
  <rect x="600" y="40" width="180" height="300" rx="10" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2" />
  <text x="690" y="30" text-anchor="middle" font-weight="bold" fill="#8e24aa">COMPUTE / RT</text>
  
  <g transform="translate(615, 60)">
    <rect width="150" height="60" rx="5" fill="#fff" stroke="#8e24aa" stroke-width="2" />
    <text x="75" y="95" text-anchor="middle" font-size="14" font-weight="bold">ComputeShader</text>
    
    <rect y="80" width="150" height="40" rx="5" fill="#fff" stroke="#8e24aa" />
    <text x="75" y="105" text-anchor="middle" font-size="12">RayTracing</text>
    
    <rect y="140" width="150" height="40" rx="5" fill="#fff" stroke="#8e24aa" />
    <text x="75" y="165" text-anchor="middle" font-size="12">AccelStructBuild</text>
  </g>

  <!-- Chunk 5: Global / System -->
  <rect x="600" y="360" width="180" height="200" rx="10" fill="#efebe9" stroke="#5d4037" stroke-width="2" />
  <text x="690" y="350" text-anchor="middle" font-weight="bold" fill="#5d4037">SYSTEM</text>
  
  <g transform="translate(615, 380)">
    <rect width="150" height="40" rx="5" fill="#fff" stroke="#5d4037" />
    <text x="75" y="25" text-anchor="middle" font-size="12">Transfer (Copy/Blit)</text>
    
    <rect y="60" width="150" height="40" rx="5" fill="#fff" stroke="#5d4037" />
    <text x="75" y="85" text-anchor="middle" font-size="12">Host (CPU Access)</text>
    
    <rect y="120" width="150" height="40" rx="5" fill="#fff" stroke="#5d4037" />
    <text x="75" y="145" text-anchor="middle" font-size="12">BottomOfPipe</text>
  </g>

  <!-- Flow Arrows -->
  <path d="M 185 100 L 220 100" fill="none" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M 375 100 L 410 100" fill="none" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Special Notes -->
  <text x="400" y="580" text-anchor="middle" font-size="12" fill="#999" font-style="italic">
    Note: 'AllGraphics' covers Geometry and Raster chunks. 'AllCommands' covers everything.
  </text>
</svg>