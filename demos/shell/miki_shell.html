<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miki Renderer Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #16213e;
            padding: 1rem 2rem;
            border-bottom: 1px solid #0f3460;
        }
        header h1 { font-size: 1.5rem; font-weight: 500; }
        header p { font-size: 0.875rem; color: #888; margin-top: 0.25rem; }
        main {
            flex: 1;
            display: flex;
            gap: 1rem;
            padding: 1rem;
        }
        .canvas-container {
            background: #0f0f23;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .canvas-container.main { flex: 3; }
        .canvas-container.side { flex: 1; display: flex; flex-direction: column; gap: 1rem; }
        .canvas-header {
            background: #16213e;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            color: #888;
            border-bottom: 1px solid #0f3460;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #main { flex: 1; }
        #child, #tool { flex: 1; min-height: 200px; }
        footer {
            background: #16213e;
            padding: 0.5rem 2rem;
            font-size: 0.75rem;
            color: #666;
            border-top: 1px solid #0f3460;
        }
        #output {
            background: #0a0a15;
            color: #0f0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.75rem;
            padding: 0.5rem;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <header>
        <h1>miki Renderer — WindowManager Demo</h1>
        <p>Multi-window, events, parent-child hierarchy on WebGPU/WASM</p>
    </header>
    <main>
        <div class="canvas-container main">
            <div class="canvas-header">Main Window (#main)</div>
            <canvas id="main"></canvas>
        </div>
        <div class="canvas-container side">
            <div>
                <div class="canvas-header">Child Window (#child)</div>
                <canvas id="child"></canvas>
            </div>
            <div>
                <div class="canvas-header">Tool Palette (#tool)</div>
                <canvas id="tool"></canvas>
            </div>
        </div>
    </main>
    <div id="output"></div>
    <footer>
        Press T to toggle tool window | ESC to quit | Built with Emscripten + contrib.glfw3
    </footer>
    <script>
        // Redirect stdout/stderr to output div
        var outputEl = document.getElementById('output');
        var Module = {
            print: function(text) {
                outputEl.textContent += text + '\n';
                outputEl.scrollTop = outputEl.scrollHeight;
            },
            printErr: function(text) {
                outputEl.textContent += '[ERR] ' + text + '\n';
                outputEl.scrollTop = outputEl.scrollHeight;
            }
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
